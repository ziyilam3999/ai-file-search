milestones:
  weekend_1:
    title: "Bootstrap & Setup"
    status: "completed"
    completion_date: "2024-12-XX"
    goals:
      - "✅ Initialize Poetry project with proper dependencies"
      - "✅ Configure VS Code settings for Black formatter and import sorting"
      - "✅ Create core/ package with proper docstring structure"
      - "✅ Set up basic project structure and tooling"
    next: "Weekend 2: Document extraction implementation"

  weekend_2:
    title: "Document Extraction"
    status: "completed"
    completion_date: "2024-12-XX"
    goals:
      - "✅ Implement core/extract.py with PDF, DOCX, and TXT support"
      - "✅ Process 20 sample documents into extracts/*.txt format"
