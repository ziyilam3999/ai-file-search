  weekend_2:
    title: "Document Extraction"
    status: "completed"
    completion_date: "2024-12-XX"
    goals:
      - "✅ Implement core/extract.py with PDF, DOCX, and TXT support"
      - "✅ Process 20 sample documents into extracts/*.txt format"
      - "✅ Achieve green pytest status with comprehensive test coverage"
      - "✅ Integrate loguru logging for colorful, informative output"
