document_categories:
  business_rules:
    enabled: true
    paths:
    - sample_docs/business_rules
  classic_literature:
    enabled: true
    paths:
    - sample_docs/classic_literature
  meeting_notes:
    enabled: true
    paths:
    - sample_docs/meeting_notes
  personal_notes:
    enabled: true
    paths:
    - sample_docs/personal_notes
  research_papers:
    enabled: true
    paths:
    - sample_docs/research_papers
  software_dev:
    enabled: true
    paths:
    - sample_docs/software_dev
  technical_docs:
    enabled: true
    paths:
    - sample_docs/technical_docs
  user_manuals:
    enabled: true
    paths:
    - sample_docs/user_manuals
file_patterns:
  ignore:
  - '*.tmp'
  - '*.log'
  - '*.pyc'
  - __pycache__
  - .git
  - '*.swp'
  - '*.bak'
  include:
  - '*.txt'
  - '*.pdf'
  - '*.docx'
  - '*.md'
watch_directories:
- sample_docs
