<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI File Search</title>
    <link rel="stylesheet" href="static/css/new_search.css">
</head>
<body>
    <div class="app-container">
        <!-- Left Panel - Chat History -->
        <div class="left-panel">
            <div class="panel-header">
                <h2>Chat History</h2>
                <button id="new-chat-btn" class="new-chat-btn">+ New Chat</button>
            </div>
            <div class="chat-list" id="chat-list">
                <div class="chat-item active" data-chat-id="1">
                    <span class="chat-title">Current Chat</span>
                </div>
            </div>
            <!-- Settings Button Footer -->
            <div class="panel-footer" style="padding: 15px; border-top: 1px solid #333; margin-top: auto; display: flex; gap: 10px;">
                <button id="logs-btn" class="new-chat-btn" style="flex: 1; display: flex; align-items: center; justify-content: center; gap: 8px; background-color: #2d2d2d;">
                    <span>📋</span> Activity
                </button>
                <button id="settings-btn" class="new-chat-btn" style="flex: 1; display: flex; align-items: center; justify-content: center; gap: 8px;">
                    <span>⚙️</span> Settings
                </button>
            </div>
        </div>

        <!-- Main Content Area -->
        <div class="main-content">
            <!-- Status Bar -->
            <div class="status-bar" id="status-bar">
                <div class="status-item">
                    <span class="status-indicator" id="watcher-indicator"></span>
                    <span id="watcher-text">Watcher: Checking...</span>
                </div>
                <div class="status-item">
                    <span class="icon">📄</span>
                    <span id="doc-count">0 docs</span>
                </div>
                <div class="status-item">
                    <span class="icon">🔍</span>
                    <span id="index-count">0 indexed</span>
                </div>
                <div class="status-item" id="indexing-progress" style="display: none;">
                    <span class="icon">⏳</span>
                    <span id="progress-text">Indexing...</span>
                </div>
            </div>

            <!-- Activity Strip (always visible) -->
            <div class="activity-strip" id="activity-strip">
                <div class="activity-latest" id="activity-latest">Activity: Idle</div>
                <button id="activity-toggle" class="activity-toggle" type="button">Details</button>
            </div>

            <!-- Answer Area -->
            <div class="answer-area">
                <div class="answer-header">
                    <h3>Answer</h3>
                </div>
                <div class="answer-content" id="answer-content">
                    <div class="placeholder-text">
                        Ask a question to see the AI answer here
                    </div>
                </div>
            </div>

            <!-- Question Area -->
            <div class="question-area">
                <div class="question-input-container">
                    <textarea 
                        id="question-input" 
                        class="question-input" 
                        placeholder="Type your question here..."
                        rows="3"
                    ></textarea>
                    <button id="search-btn" class="search-btn">Search</button>
                </div>
            </div>
        </div>

        <!-- Activity Sidebar (Right) -->
        <div class="activity-sidebar" id="activity-sidebar">
            <div class="activity-sidebar-header">
                <h3>Activity Log</h3>
                <button id="activity-close" class="activity-close-btn" type="button">&times;</button>
            </div>
            <div class="activity-sidebar-content">
                <div class="activity-list" id="activity-list"></div>
            </div>
        </div>
    </div>

    <script src="static/js/new_search.js?v=2"></script>
</body>
</html>
