<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI File Search</title>
    <link rel="stylesheet" href="static/css/new_search.css">
</head>
<body>
    <div class="app-container">
        <!-- Left Panel - Chat History -->
        <div class="left-panel">
            <div class="panel-header">
                <h2>Chat History</h2>
                <button id="new-chat-btn" class="new-chat-btn">+ New Chat</button>
            </div>
            <div class="chat-list" id="chat-list">
                <div class="chat-item active" data-chat-id="1">
                    <span class="chat-title">Current Chat</span>
                </div>
            </div>
        </div>

        <!-- Main Content Area -->
        <div class="main-content">
            <!-- Answer Area (70% of main content) -->
            <div class="answer-area">
                <div class="answer-header">
                    <h3>Answer</h3>
                </div>
                <div class="answer-content" id="answer-content">
                    <div class="placeholder-text">
                        Ask a question to see the AI answer here
                    </div>
                </div>
            </div>

            <!-- Empty Space (10% of main content) -->
            <div class="spacing-area"></div>

            <!-- Question Area (20% of main content) -->
            <div class="question-area">
                <div class="question-input-container">
                    <textarea 
                        id="question-input" 
                        class="question-input" 
                        placeholder="Type your question here..."
                        rows="3"
                    ></textarea>
                    <button id="search-btn" class="search-btn">Search</button>
                </div>
            </div>
        </div>
    </div>

    <script src="static/js/new_search.js"></script>
</body>
</html>
